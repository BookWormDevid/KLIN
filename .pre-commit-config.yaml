minimum_pre_commit_version: "3.6.0"
default_language_version:
  python: python3.10

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: [--maxkb=8192]
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-yaml
        files: \.ya?ml$
      - id: check-json
      - id: check-toml
      - id: check-ast
      - id: debug-statements
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff-check
        args: [--fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  - repo: local
    hooks:
      - id: mypy
        name: mypy (project)
        entry: uv run -m mypy .
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: pylint
        name: pylint (app)
        entry: uv run pylint app
        language: system
        pass_filenames: false
        stages: [pre-push]

  # Dockerfile lint
  - repo: https://github.com/coatl-dev/hadolint-coatl
    rev: 2.14.0
    hooks:
      - id: hadolint
        files: (^|/)(Dockerfile|.*\.Dockerfile)$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        stages: [pre-push]
