services:
  # --- DATABASE SECTION ---
  postgresql:
    image: postgres:17.0
    container_name: klin-postgresql
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_MAX_CONNECTIONS: 200
    networks:
      - web
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: klin-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:?PGADMIN_DEFAULT_EMAIL is required}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?PGADMIN_DEFAULT_PASSWORD is required}
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=web'
      - 'traefik.http.routers.pgadmin.rule=Host(`pgadmin.localhost`)'
      - 'traefik.http.services.pgadmin.loadbalancer.server.port=80'
    networks:
      - web
    depends_on:
      - postgresql

  # --- AIRFLOW 3.0 SECTION ---
    # --- AIRFLOW 3.0 SECTION ---
  airflow-init:
    image: apache/airflow:latest
    container_name: klin-airflow-init
    networks:
      - web
    depends_on:
      - postgresql
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgresql:5432/airflow
      AIRFLOW__CORE__AUTH_MANAGER: "airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager"
    entrypoint: /bin/bash
    command: >
      -c "pip install apache-airflow-providers-fab &&
      airflow db migrate &&
      airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password ${AIRFLOW_ADMIN_PASSWORD:-admin} || true"

  airflow-webserver:
    image: apache/airflow:latest
    container_name: klin-airflow-webserver
    restart: unless-stopped
    networks:
      - web
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgresql:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__AUTH_MANAGER: "airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager"
      AIRFLOW__API__AUTH_BACKENDS: "airflow.providers.fab.auth_manager.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
      AIRFLOW__API__SECRET_KEY: "super-secret-key-123"
      AIRFLOW__WEBSERVER__SECRET_KEY: "super-secret-key-123"
    volumes:
      - ./dags:/opt/airflow/dags
    entrypoint: /bin/bash
    command: >
      -c "pip install apache-airflow-providers-fab && airflow api-server"
    ports:
      - "8081:8080"
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=web'
      - 'traefik.http.routers.airflow.rule=Host(`airflow.localhost`)'
      - 'traefik.http.services.airflow.loadbalancer.server.port=8080'

  airflow-scheduler:
    image: apache/airflow:latest
    container_name: klin-airflow-scheduler
    restart: unless-stopped
    networks:
      - web
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgresql:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__AUTH_MANAGER: "airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager"
    volumes:
      - ./dags:/opt/airflow/dags
    entrypoint: /bin/bash
    command: >
      -c "pip install apache-airflow-providers-fab && airflow scheduler"

  # --- MONITORING SECTION ---
  prometheus:
    image: prom/prometheus:latest
    container_name: klin-prometheus
    restart: unless-stopped
    networks:
      - web
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus_data:/prometheus
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.prometheus.rule=Host(`prometheus.localhost`)'
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana-enterprise:latest
    container_name: klin-grafana
    restart: unless-stopped
    networks:
      - web
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.grafana.rule=Host(`grafana.localhost`)'

  # --- EXPORTERS ---
  postgres_exporter-klin:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: klin-postgres_exporter-klin
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgresql:5432/postgres?sslmode=disable"
    networks:
      - web

  postgres_exporter-ml:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: klin-postgres_exporter-ml
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgresql:5432/ml?sslmode=disable"
    networks:
      - web

  node_exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    restart: unless-stopped
    networks:
      - web
    command:
      - '--path.rootfs=/rootfs'
    volumes:
      - /:/rootfs:ro

  # --- MESSAGE BROKER & AI ---
  rabbitmq:
    image: rabbitmq:3-management
    container_name: klin-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    networks:
      - web

  triton:
    image: nvcr.io/nvidia/tritonserver:24.01-py3
    container_name: klin-triton
    restart: unless-stopped
    command: ["tritonserver", "--model-repository=/models", "--metrics-port=8002"]
    networks:
      - web
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]

  # --- GATEWAY ---
  traefik:
    image: traefik:latest
    container_name: klin-traefik
    restart: unless-stopped
    networks:
      - web
    ports:
      - '80:80'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --api.insecure=true --providers.docker

networks:
  web:
    external: true

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
