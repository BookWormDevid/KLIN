x-airflow-common-env: &airflow-common-env
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DATABASE_URL:?AIRFLOW_DATABASE_URL is required}
  AIRFLOW__CORE__AUTH_MANAGER: "airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager"
  AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY:?AIRFLOW_SECRET_KEY is required}
  AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:?AIRFLOW_SECRET_KEY is required}

services:
  # --- DATABASE SECTION ---
  postgresql:
    image: postgres:17.0
    container_name: klin-postgresql
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${APP_DB_NAME:?APP_DB_NAME is required}
      POSTGRES_MAX_CONNECTIONS: 200
    networks:
      - web
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER} -d ${APP_DB_NAME}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres-init:
    image: postgres:17.0
    container_name: klin-postgres-init
    networks:
      - web
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    entrypoint: /bin/bash
    command: >
      -c "
      until pg_isready -h postgresql -U ${POSTGRES_USER} -d ${APP_DB_NAME}; do
        sleep 2
      done

      psql -h postgresql -U ${POSTGRES_USER} -d postgres -tAc \"SELECT 1 FROM pg_database WHERE datname = '${AIRFLOW_DB_NAME:?AIRFLOW_DB_NAME is required}'\" | grep -q 1 ||
      psql -h postgresql -U ${POSTGRES_USER} -d postgres -c \"CREATE DATABASE \\\"${AIRFLOW_DB_NAME:?AIRFLOW_DB_NAME is required}\\\"\"

      psql -h postgresql -U ${POSTGRES_USER} -d postgres -tAc \"SELECT 1 FROM pg_database WHERE datname = '${ML_METRICS_DB_NAME:-ml}'\" | grep -q 1 ||
      psql -h postgresql -U ${POSTGRES_USER} -d postgres -c \"CREATE DATABASE \\\"${ML_METRICS_DB_NAME:-ml}\\\"\"
      "

  pgadmin:
    image: dpage/pgadmin4
    container_name: klin-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:?PGADMIN_DEFAULT_EMAIL is required}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?PGADMIN_DEFAULT_PASSWORD is required}
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=web'
      - 'traefik.http.routers.pgadmin.rule=Host(`pgadmin.localhost`)'
      - 'traefik.http.services.pgadmin.loadbalancer.server.port=80'
    networks:
      - web
    depends_on:
      postgresql:
        condition: service_healthy

  # --- AIRFLOW SECTION ---
  airflow-init:
    image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:3.1.7}
    container_name: klin-airflow-init
    networks:
      - web
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-common-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
    entrypoint: /bin/bash
    command: >
      -c "pip install apache-airflow-providers-fab &&
      airflow db migrate &&
      airflow users create --username ${AIRFLOW_ADMIN_USER:-admin} --firstname Admin --lastname User --role Admin --email ${AIRFLOW_ADMIN_EMAIL:-admin@example.com} --password ${AIRFLOW_ADMIN_PASSWORD:-admin} || true"

  airflow-webserver:
    image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:3.1.7}
    container_name: klin-airflow-webserver
    restart: unless-stopped
    networks:
      - web
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__API__AUTH_BACKENDS: "airflow.providers.fab.auth_manager.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
    entrypoint: /bin/bash
    command: >
      -c "pip install apache-airflow-providers-fab && airflow api-server"
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=web'
      - 'traefik.http.routers.airflow.rule=Host(`airflow.localhost`)'
      - 'traefik.http.services.airflow.loadbalancer.server.port=8080'
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/v2/version').read()"
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  airflow-scheduler:
    image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:3.1.7}
    container_name: klin-airflow-scheduler
    restart: unless-stopped
    networks:
      - web
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
    entrypoint: /bin/bash
    command: >
      -c "pip install apache-airflow-providers-fab && airflow scheduler"

  # --- MONITORING SECTION ---
  prometheus:
    image: prom/prometheus:latest
    container_name: klin-prometheus
    restart: unless-stopped
    networks:
      - web
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.prometheus.rule=Host(`prometheus.localhost`)'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:9090/-/healthy >/dev/null 2>&1 || exit 1
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s

  alertmanager:
    image: prom/alertmanager:latest
    container_name: klin-alertmanager
    restart: unless-stopped
    networks:
      - web
    environment:
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:?ALERT_EMAIL_TO is required}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM:?ALERT_EMAIL_FROM is required}
      SMTP_HOST: ${SMTP_HOST:?SMTP_HOST is required}
      SMTP_PORT: ${SMTP_PORT:?SMTP_PORT is required}
      SMTP_USER: ${SMTP_USER:?SMTP_USER is required}
      SMTP_PASSWORD: ${SMTP_PASSWORD:?SMTP_PASSWORD is required}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:?TELEGRAM_CHAT_ID is required}
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --config.expand-env
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.alertmanager.rule=Host(`alertmanager.localhost`)'
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:9093/-/healthy >/dev/null 2>&1 || exit 1
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s

  grafana:
    image: grafana/grafana-enterprise:latest
    container_name: klin-grafana
    restart: unless-stopped
    networks:
      - web
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.grafana.rule=Host(`grafana.localhost`)'

  # --- EXPORTERS ---
  postgres_exporter-klin:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: klin-postgres_exporter-klin
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgresql:5432/${APP_DB_NAME:?APP_DB_NAME is required}?sslmode=disable"
    networks:
      - web

  postgres_exporter-ml:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: klin-postgres_exporter-ml
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgresql:5432/${ML_METRICS_DB_NAME:-ml}?sslmode=disable"
    networks:
      - web

  node_exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    restart: unless-stopped
    networks:
      - web
    command:
      - '--path.rootfs=/rootfs'
    volumes:
      - /:/rootfs:ro

  # --- MESSAGE BROKER & AI ---
  rabbitmq:
    image: rabbitmq:3-management
    container_name: klin-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    command: >
      /bin/bash -c "rabbitmq-plugins enable --offline rabbitmq_prometheus &&
      rabbitmq-server"
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    networks:
      - web
    healthcheck:
      test:
        - CMD
        - rabbitmq-diagnostics
        - -q
        - ping
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  triton:
    build:
      context: .
      dockerfile: Dockerfile.triton
    container_name: klin-triton
    environment:
      - TRITON_PYTHON_BACKEND_REBUILD_ENV=1
    restart: unless-stopped
    command:
      - tritonserver
      - --model-repository=/models
      - --exit-on-error=${TRITON_EXIT_ON_ERROR:-false}
    volumes:
      - ./model_repository:/models
    ports:
      - "127.0.0.1:8000:8000"
      - "127.0.0.1:8001:8001"
      - "127.0.0.1:8002:8002"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    networks:
      - web
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v2/health/ready').read()"
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s

  # --- GATEWAY ---
  traefik:
    image: traefik:latest
    container_name: klin-traefik
    restart: unless-stopped
    networks:
      - web
    ports:
      - '127.0.0.1:80:80'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --api.insecure=true --providers.docker

networks:
  web:
    external: true

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
