global:
  resolve_timeout: 5m

route:
  receiver: team-notifications
  group_by:
    - alertname
    - service
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h

receivers:
  - name: team-notifications
    email_configs:
      - to: "${ALERT_EMAIL_TO}"
        from: "${ALERT_EMAIL_FROM}"
        smarthost: "${SMTP_HOST}:${SMTP_PORT}"
        auth_username: "${SMTP_USER}"
        auth_password: "${SMTP_PASSWORD}"
        require_tls: true
        send_resolved: true
    telegram_configs:
      - bot_token: "${TELEGRAM_BOT_TOKEN}"
        chat_id: ${TELEGRAM_CHAT_ID}
        parse_mode: HTML
        send_resolved: true
        message: '{{ range .Alerts }}<b>{{ .Annotations.summary }}</b>{{ "\n" }}{{ .Annotations.description }}{{ "\n" }}{{ end }}'
