groups:
  - name: klin-service-health
    rules:
      - alert: KlinApiDown
        expr: up{job="litestar_app_host"} == 0
        for: 2m
        labels:
          severity: critical
          service: klin-api
        annotations:
          summary: "KLIN API недоступен"
          description: "Prometheus не может получить /metrics от litestar_app_host более 2 минут."

      - alert: RabbitMQExporterDown
        expr: up{job="rabbitmq"} == 0
        for: 2m
        labels:
          severity: warning
          service: rabbitmq
        annotations:
          summary: "RabbitMQ exporter недоступен"
          description: "Метрики RabbitMQ не собираются более 2 минут."

      - alert: KlinPostgresExporterDown
        expr: up{job="postgres_exporter-klin"} == 0
        for: 2m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "PostgreSQL exporter (klin) недоступен"
          description: "Метрики базы klin не собираются более 2 минут."

      - alert: MlPostgresExporterDown
        expr: up{job="postgres_exporter-ml"} == 0
        for: 2m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "PostgreSQL exporter (ml) недоступен"
          description: "Метрики базы ml не собираются более 2 минут."
