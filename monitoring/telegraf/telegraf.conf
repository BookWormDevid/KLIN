[agent]
  interval = "15s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "15s"
  flush_jitter = "0s"
  precision = "0s"
  omit_hostname = false

[[inputs.internal]]

[[inputs.prometheus]]
  urls = [
    "http://node_exporter:9100/metrics",
    "http://rabbitmq:15692/metrics",
    "http://rabbitmq_exporter:9419/metrics",
    "http://postgres_exporter-klin:9187/metrics",
    "http://postgres_exporter-ml:9187/metrics",
    "http://triton:8002/metrics",
    "http://host.docker.internal:8008/metrics"
  ]
  metric_version = 2

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "$INFLUXDB_TOKEN"
  organization = "$INFLUXDB_ORG"
  bucket = "$INFLUXDB_BUCKET"
