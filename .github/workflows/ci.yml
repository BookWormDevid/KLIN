name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies
        run: uv sync --dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run -m mypy .

      - name: Pylint (app only)
        run: uv run pylint app

      - name: Validate compose configs
        run: |
          cp example.env .env
          docker compose -f docker-compose.infra.yml config > /tmp/infra.config.out
          docker compose -f docker-compose.yml config > /tmp/app.config.out
