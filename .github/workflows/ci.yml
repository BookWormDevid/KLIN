name: CI

on:
  push:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "mlflow/**"
      - "mlruns/**"
      - "sandbox/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "mlflow/**"
      - "mlruns/**"
      - "sandbox/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.10"
  PYLINTHOME: .cache/pylint
  UV_NO_PROGRESS: "1"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      infra: ${{ steps.filter.outputs.infra }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            python:
              - "app/**"
              - "helpers/**"
              - "tests/**"
              - "pyproject.toml"
              - "uv.lock"
              - "alembic.ini"
              - ".github/workflows/ci.yml"
            infra:
              - "docker/**"
              - "monitoring/**"
              - "example.env"
              - "Makefile"
              - ".github/workflows/ci.yml"

  python-quality:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Ruff check
        run: uvx ruff check app helpers tests

      - name: Ruff format check
        run: uvx ruff format --check app helpers tests

      - name: Sync dependencies
        run: uv sync --dev --frozen --no-install-project

      - name: Mypy
        run: uv run -m mypy app helpers tests

      - name: Pylint (app only)
        run: uv run pylint --jobs=1 app

      - name: Pytest
        run: uv run pytest -q --maxfail=1

      - name: Minimize uv cache
        if: always()
        run: uv cache prune --ci

  infra-validate:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate app compose
        run: docker compose --env-file example.env -f docker/docker-compose.yml config >/dev/null

      - name: Validate infra compose
        run: docker compose --env-file example.env -f docker/docker-compose.infra.yml config >/dev/null
