name: CI

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "mlflow/**"
      - "mlruns/**"
      - "sandbox/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "mlflow/**"
      - "mlruns/**"
      - "sandbox/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --dev --frozen --no-install-project

      - name: Ruff check
        run: uv run ruff check app helpers tests

      - name: Ruff format check
        run: uv run ruff format --check app helpers tests

      - name: Mypy
        run: uv run -m mypy app helpers tests

      - name: Pylint (app only)
        run: uv run pylint app

      - name: Pytest
        run: uv run pytest -q --maxfail=1
