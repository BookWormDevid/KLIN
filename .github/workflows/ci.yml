name: CI

on:
  push:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "mlflow/**"
      - "sandbox/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "mlflow/**"
      - "sandbox/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHON_VERSION: "3.10"
  PYLINTHOME: .cache/pylint
  UV_NO_PROGRESS: "1"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      helpers: ${{ steps.filter.outputs.helpers }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            python:
              - "app/**"
              - "helpers/**"
              - "tests/**"
              - "pyproject.toml"
              - "uv.lock"
              - "alembic.ini"
              - ".github/workflows/ci.yml"
            helpers:
              - "helpers/**"

  lint:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Restore tool caches
        uses: actions/cache@v4
        with:
          path: |
            .cache/pylint
            .ruff_cache
          key: ${{ runner.os }}-python-${{ env.PYTHON_VERSION }}-lint-tools-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-python-${{ env.PYTHON_VERSION }}-lint-tools-

      - name: Select CI dependency groups
        id: lint-groups
        shell: bash
        run: |
          groups=(--group ci)
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ needs.changes.outputs.helpers }}" == "true" ]]; then
            groups+=(--group ci-helpers)
          fi
          printf 'args=%s\n' "${groups[*]}" >> "$GITHUB_OUTPUT"

      - name: Sync CI dependencies
        run: uv sync --no-dev ${{ steps.lint-groups.outputs.args }} --frozen --no-install-project

      - name: Ruff check
        run: uv run --no-sync ruff check app helpers tests

      - name: Ruff format check
        run: uv run --no-sync ruff format --check app helpers tests

      - name: Ty check
        shell: bash
        run: |
          set -euo pipefail
          ty_targets=(app tests)
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ needs.changes.outputs.helpers }}" == "true" ]]; then
            ty_targets+=(helpers)
          fi
          uv run --no-sync ty check "${ty_targets[@]}"

      - name: Pylint
        shell: bash
        run: |
          set -euo pipefail
          uv run --no-sync -m pylint --jobs=0 app

      - name: Minimize uv cache
        if: always()
        run: uv cache prune --ci

  test:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Select CI dependency groups
        id: test-groups
        shell: bash
        run: |
          groups=(--group ci)
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ needs.changes.outputs.helpers }}" == "true" ]]; then
            groups+=(--group ci-helpers)
          fi
          printf 'args=%s\n' "${groups[*]}" >> "$GITHUB_OUTPUT"

      - name: Sync CI dependencies
        run: uv sync --no-dev ${{ steps.test-groups.outputs.args }} --frozen --no-install-project

      - name: Pytest with coverage
        run: uv run --no-sync pytest -q --maxfail=1

      - name: Coverage summary
        run: |
          echo '## Coverage' >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          uv run --no-sync -m coverage report >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Minimize uv cache
        if: always()
        run: uv cache prune --ci
