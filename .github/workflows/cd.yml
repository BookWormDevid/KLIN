name: CD

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "mlflow/**"
      - "sandbox/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      api_image: ${{ steps.vars.outputs.api_image }}
      worker_image: ${{ steps.vars.outputs.worker_image }}
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compute image names
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          owner_lc="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "api_image=${{ env.REGISTRY }}/${owner_lc}/klin-api" >> "$GITHUB_OUTPUT"
          echo "worker_image=${{ env.REGISTRY }}/${owner_lc}/klin-worker" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.vars.outputs.api_image }}:latest
            ${{ steps.vars.outputs.api_image }}:${{ steps.vars.outputs.image_tag }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.queue
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.vars.outputs.worker_image }}:latest
            ${{ steps.vars.outputs.worker_image }}:${{ steps.vars.outputs.image_tag }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Debug deploy connectivity
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Runner public IP:"
          curl -fsS https://api.ipify.org
          echo
          echo "DNS resolution for DEPLOY_HOST:"
          getent ahosts "$DEPLOY_HOST" || nslookup "$DEPLOY_HOST" || true
          echo "TCP probe to ${DEPLOY_HOST}:${DEPLOY_PORT}:"
          timeout 10 bash -c "cat < /dev/null > /dev/tcp/${DEPLOY_HOST}/${DEPLOY_PORT}" \
            && echo "TCP port is reachable" \
            || echo "TCP probe failed"

      - name: Deploy to server over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_REF: ${{ github.sha }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          KLIN_API_IMAGE: ${{ needs.build-and-push.outputs.api_image }}
          KLIN_WORKER_IMAGE: ${{ needs.build-and-push.outputs.worker_image }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          timeout: 30s
          command_timeout: 10m
          envs: DEPLOY_PATH,DEPLOY_REF,GHCR_USERNAME,GHCR_TOKEN,IMAGE_TAG,KLIN_API_IMAGE,KLIN_WORKER_IMAGE
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"
            git fetch --all --tags --prune
            git checkout "$DEPLOY_REF"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            export IMAGE_TAG
            export KLIN_API_IMAGE
            export KLIN_WORKER_IMAGE
            docker compose --env-file .env -f docker/docker-compose.deploy.yml pull
            docker compose --env-file .env -f docker/docker-compose.deploy.yml up -d
