name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  check-changes:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      deploy_changed: ${{ steps.filter.outputs.deploy_changed }}
      dags_changed: ${{ steps.filter.outputs.dags_changed }}
      app_image_changed: ${{ steps.filter.outputs.app_image_changed }}
      airflow_image_changed: ${{ steps.filter.outputs.airflow_image_changed }}
      api_image: ${{ steps.vars.outputs.api_image }}
      worker_image: ${{ steps.vars.outputs.worker_image }}
      batch_image: ${{ steps.vars.outputs.batch_image }}
      airflow_image: ${{ steps.vars.outputs.airflow_image }}
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Detect deploy changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            deploy_changed:
              - "app/**"
              - "airflow/**"
              - "pyproject.toml"
              - "uv.lock"
              - "alembic.ini"
              - "docker/Dockerfile.api"
              - "docker/Dockerfile.airflow"
              - "docker/Dockerfile.queue"
              - "docker/docker-compose.deploy.yml"
              - "docker/docker-compose.server.yml"
              - ".github/workflows/cd.yml"
            dags_changed:
              - "airflow/dags/**"
              - "airflow/plugins/**"
              - "docker/docker-compose.server.yml"
              - ".github/workflows/cd.yml"
            app_image_changed:
              - "app/**"
              - "pyproject.toml"
              - "uv.lock"
              - "alembic.ini"
              - "docker/Dockerfile.api"
              - "docker/Dockerfile.queue"
              - ".github/workflows/cd.yml"
            airflow_image_changed:
              - "pyproject.toml"
              - "uv.lock"
              - "docker/Dockerfile.airflow"
              - ".github/workflows/cd.yml"

      - name: Compute image names
        id: vars
        if: steps.filter.outputs.deploy_changed == 'true' || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          owner_lc="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "api_image=${{ env.REGISTRY }}/${owner_lc}/klin-api" >> "$GITHUB_OUTPUT"
          echo "worker_image=${{ env.REGISTRY }}/${owner_lc}/klin-worker" >> "$GITHUB_OUTPUT"
          echo "batch_image=${{ env.REGISTRY }}/${owner_lc}/klin-batch-runner" >> "$GITHUB_OUTPUT"
          echo "airflow_image=${{ env.REGISTRY }}/${owner_lc}/klin-airflow" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: check-changes
    runs-on: ubuntu-latest
    if: needs.check-changes.outputs.deploy_changed == 'true' || github.event_name == 'workflow_dispatch'

    outputs:
      api_image: ${{ needs.check-changes.outputs.api_image }}
      worker_image: ${{ needs.check-changes.outputs.worker_image }}
      batch_image: ${{ needs.check-changes.outputs.batch_image }}
      airflow_image: ${{ needs.check-changes.outputs.airflow_image }}
      image_tag: ${{ needs.check-changes.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Debug resolved outputs
        shell: bash
        run: |
          echo "deploy_changed=${{ needs.check-changes.outputs.deploy_changed }}"
          echo "app_image_changed=${{ needs.check-changes.outputs.app_image_changed }}"
          echo "airflow_image_changed=${{ needs.check-changes.outputs.airflow_image_changed }}"
          echo "api_image=${{ needs.check-changes.outputs.api_image }}"
          echo "worker_image=${{ needs.check-changes.outputs.worker_image }}"
          echo "batch_image=${{ needs.check-changes.outputs.batch_image }}"
          echo "airflow_image=${{ needs.check-changes.outputs.airflow_image }}"
          echo "image_tag=${{ needs.check-changes.outputs.image_tag }}"

      - name: Validate image variables
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ needs.check-changes.outputs.api_image }}"
          test -n "${{ needs.check-changes.outputs.worker_image }}"
          test -n "${{ needs.check-changes.outputs.batch_image }}"
          test -n "${{ needs.check-changes.outputs.airflow_image }}"
          test -n "${{ needs.check-changes.outputs.image_tag }}"

      - name: Set up Docker Buildx
        if: needs.check-changes.outputs.app_image_changed == 'true' || needs.check-changes.outputs.airflow_image_changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: needs.check-changes.outputs.app_image_changed == 'true' || needs.check-changes.outputs.airflow_image_changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        if: needs.check-changes.outputs.app_image_changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          platforms: linux/amd64
          push: true
          tags: |
            ${{ needs.check-changes.outputs.api_image }}:latest
            ${{ needs.check-changes.outputs.api_image }}:${{ needs.check-changes.outputs.image_tag }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push worker and batch images
        if: needs.check-changes.outputs.app_image_changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.queue
          platforms: linux/amd64
          push: true
          tags: |
            ${{ needs.check-changes.outputs.worker_image }}:latest
            ${{ needs.check-changes.outputs.worker_image }}:${{ needs.check-changes.outputs.image_tag }}
            ${{ needs.check-changes.outputs.batch_image }}:latest
            ${{ needs.check-changes.outputs.batch_image }}:${{ needs.check-changes.outputs.image_tag }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Build and push Airflow image
        if: needs.check-changes.outputs.airflow_image_changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.airflow
          platforms: linux/amd64
          push: true
          tags: |
            ${{ needs.check-changes.outputs.airflow_image }}:latest
            ${{ needs.check-changes.outputs.airflow_image }}:${{ needs.check-changes.outputs.image_tag }}
          cache-from: type=gha,scope=airflow
          cache-to: type=gha,mode=max,scope=airflow

  deploy:
    needs: [check-changes, build-and-push]
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    environment: production

    steps:
      - name: Deploy to server over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_REF: ${{ github.event.workflow_run.head_sha || github.sha }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          FORCE_FULL_DEPLOY: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
          AIRFLOW_COMPOSE_FILE: ${{ secrets.AIRFLOW_COMPOSE_FILE }}
          DAGS_CHANGED: ${{ needs.check-changes.outputs.dags_changed }}
          APP_IMAGE_CHANGED: ${{ needs.check-changes.outputs.app_image_changed }}
          AIRFLOW_IMAGE_CHANGED: ${{ needs.check-changes.outputs.airflow_image_changed }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          KLIN_API_IMAGE: ${{ needs.build-and-push.outputs.api_image }}
          KLIN_WORKER_IMAGE: ${{ needs.build-and-push.outputs.worker_image }}
          KLIN_BATCH_RUNNER_IMAGE: ${{ needs.build-and-push.outputs.batch_image }}
          KLIN_AIRFLOW_IMAGE: ${{ needs.build-and-push.outputs.airflow_image }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          timeout: 30s
          command_timeout: 15m
          envs: DEPLOY_PATH,DEPLOY_REF,GHCR_USERNAME,GHCR_TOKEN,FORCE_FULL_DEPLOY,AIRFLOW_COMPOSE_FILE,DAGS_CHANGED,APP_IMAGE_CHANGED,AIRFLOW_IMAGE_CHANGED,IMAGE_TAG,KLIN_API_IMAGE,KLIN_WORKER_IMAGE,KLIN_BATCH_RUNNER_IMAGE,KLIN_AIRFLOW_IMAGE
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"
            AIRFLOW_COMPOSE_FILE="${AIRFLOW_COMPOSE_FILE:-docker/docker-compose.server.yml}"
            git fetch --all --tags --prune
            git checkout "$DEPLOY_REF"
            if [ "$APP_IMAGE_CHANGED" = "true" ] || [ "$AIRFLOW_IMAGE_CHANGED" = "true" ] || [ "$FORCE_FULL_DEPLOY" = "true" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi

            if [ "$APP_IMAGE_CHANGED" = "true" ] || [ "$FORCE_FULL_DEPLOY" = "true" ]; then
              export IMAGE_TAG
              export KLIN_API_IMAGE
              export KLIN_WORKER_IMAGE
              docker compose --env-file .env -f docker/docker-compose.deploy.yml pull
              docker compose --env-file .env -f docker/docker-compose.deploy.yml up -d
            fi

            if [ "$DAGS_CHANGED" = "true" ] || [ "$APP_IMAGE_CHANGED" = "true" ] || [ "$AIRFLOW_IMAGE_CHANGED" = "true" ] || [ "$FORCE_FULL_DEPLOY" = "true" ]; then
              if [ "$APP_IMAGE_CHANGED" = "true" ] || [ "$FORCE_FULL_DEPLOY" = "true" ]; then
                export KLIN_BATCH_RUNNER_IMAGE="${KLIN_BATCH_RUNNER_IMAGE}:${IMAGE_TAG}"
                docker pull "$KLIN_BATCH_RUNNER_IMAGE"
              fi

              if [ "$AIRFLOW_IMAGE_CHANGED" = "true" ] || [ "$FORCE_FULL_DEPLOY" = "true" ]; then
                export KLIN_AIRFLOW_IMAGE="${KLIN_AIRFLOW_IMAGE}:${IMAGE_TAG}"
                docker pull "$KLIN_AIRFLOW_IMAGE"
              fi

              docker compose --env-file .env -f "$AIRFLOW_COMPOSE_FILE" up -d --force-recreate airflow-webserver airflow-scheduler airflow-dag-processor
            fi
